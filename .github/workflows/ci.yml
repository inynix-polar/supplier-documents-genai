name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      LLM_FAKE: "1"

    steps:
      - name: Получить исходный код
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Проверить соглашения PR и коммитов
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          COMMIT_RANGE: ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}
        run: |
          python3 scripts/check_conventional.py --message "$PR_TITLE"
          python3 scripts/check_conventional.py --range "$COMMIT_RANGE"

      - name: Установить uv и Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          python-version: "3.12"
          working-directory: genai
          enable-cache: true
          cache-python: true
          cache-dependency-glob: genai/uv.lock

      - name: Проверить lock-файл
        working-directory: genai
        run: uv lock --check

      - name: Установить зависимости
        working-directory: genai
        run: uv sync --locked --all-groups

      - name: Проверить линтером
        working-directory: genai
        run: uv run --frozen ruff check --config pyproject.toml . ../scripts

      - name: Проверить форматирование
        working-directory: genai
        run: uv run --frozen ruff format --check --config pyproject.toml . ../scripts

      - name: Проверить типы
        working-directory: genai
        run: uv run --frozen mypy

      - name: Запустить тесты
        working-directory: genai
        run: uv run --frozen pytest

      - name: Собрать тестовый Docker-образ
        run: >-
          docker build
          --target test
          --file genai/Dockerfile
          --tag supplier-documents-genai:test
          .

      - name: Запустить тесты в Docker
        run: docker run --rm supplier-documents-genai:test

      - name: Собрать минимальный Docker runtime
        run: >-
          docker build
          --file genai/Dockerfile
          --tag supplier-documents-genai:eval
          .

      - name: Запустить eval в Docker
        run: docker run --rm supplier-documents-genai:eval --seed 42
